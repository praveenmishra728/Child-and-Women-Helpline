<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – SurakshaAI</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>
</head>
<body>
<main class="not-found" role="main">
  <div class="animate-slide-up">
    <div class="not-found-code" aria-hidden="true">404</div>
    <div style="font-size:3rem;margin:var(--space-6) 0" aria-hidden="true">🛡️</div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div style="display:flex;gap:var(--space-4);justify-content:center;flex-wrap:wrap;margin-top:var(--space-8)">
      <a href="index.html"    class="btn btn-primary btn-lg"><i class="ph ph-house"></i> Go Home</a>
      <a href="emergency.html"class="btn btn-danger btn-lg"><i class="ph ph-phone-call"></i> Emergency</a>
    </div>
    <p style="margin-top:var(--space-8);color:rgba(255,255,255,0.5);font-size:var(--font-size-sm)">
      Need help? Call <a href="tel:112" style="color:white;font-weight:700">112</a> or
      <a href="emergency.html" style="color:var(--color-accent-light)">view all helplines</a>.
    </p>
  </div>
</main>
</body>
</html>
